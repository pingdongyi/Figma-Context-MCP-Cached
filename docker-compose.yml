services:
  figma-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: figma-mcp-cached:latest
    container_name: figma-mcp-server
    ports:
      - "3333:3333"
    environment:
      # Authentication (required - set in .env or here)
      - FIGMA_API_KEY=${FIGMA_API_KEY}
      - FIGMA_OAUTH_TOKEN=${FIGMA_OAUTH_TOKEN}
      # HTTP endpoint authentication (optional but recommended for production)
      - MCP_AUTH_TOKEN=${MCP_AUTH_TOKEN}
      # HTTP server port
      - PORT=3333
      # Output format: yaml or json
      - OUTPUT_FORMAT=${OUTPUT_FORMAT:-yaml}
      # Caching configuration (optional)
      - FIGMA_CACHING=${FIGMA_CACHING}
    volumes:
      # Optional: persist cache data between restarts
      - figma-cache:/app/cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3333/mcp"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

volumes:
  figma-cache:
    driver: local